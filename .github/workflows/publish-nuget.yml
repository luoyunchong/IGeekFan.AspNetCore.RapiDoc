name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
        id: nuget-login

      - name: Restore dependencies
        run: dotnet restore IGeekFan.AspNetCore.RapiDoc.sln

      - name: Build
        run: dotnet build IGeekFan.AspNetCore.RapiDoc.sln --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/IGeekFan.AspNetCore.RapiDoc/IGeekFan.AspNetCore.RapiDoc.csproj --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.AspNetCore.RapiDoc.Extra/IGeekFan.AspNetCore.RapiDoc.Extra.csproj --configuration Release --no-build --output ./nupkg/packages

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/packages/*.nupkg --skip-duplicate -s https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/packages/*.nupkg
          generate_release_notes: true
